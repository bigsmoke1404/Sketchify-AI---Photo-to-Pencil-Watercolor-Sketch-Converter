[theme]
# Dark glassmorphism theme — matches custom CSS in app.py
primaryColor        = "#6C63FF"
backgroundColor     = "#0F0F1A"
secondaryBackgroundColor = "#1A1A2E"
textColor           = "#FFFFFF"
font                = "sans serif"

[server]
# Maximum upload size in MB (match app.py intent)
maxUploadSize       = 10
enableCORS          = false
enableXsrfProtection = true

[browser]
gatherUsageStats    = false
